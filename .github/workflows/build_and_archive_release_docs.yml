name: Build and archive documentation from release branches

on:
  push:
    branches:
      - 'uyuni-20[0-9][0-9].[0-9][0-9]'
      - 'manager-4.3-MU-4.3.[0-9][0-9]?'
      - 'manager-5.0-alpha[0-9]'
      - 'manager-5.0-beta[0-9]'
      - 'manager-5.0-rc[0-9]'
      - 'manager-5.0-gmc[0-9]'
      - 'manager-5.0-gm'
      - 'manager-5.0'
      - 'manager-5.0-MU-5.0.[0-9][0-9]?'
      - 'manager-5.1-alpha[0-9]'
      - 'manager-5.1-beta[0-9]'
      - 'manager-5.1-rc[0-9]'
      - 'manager-5.1-gmc[0-9]'
      - 'manager-5.1-gm'
      - 'manager-5.1-MU-5.1.[0-9][0-9]?'

jobs:

  # ── Uyuni OBS packages ─────────────────────────────────────────────────────
  uyuni-obs:
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'uyuni-')

    container:
      image: ghcr.io/uyuni-project/uyuni-docs-builder:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v4

    - name: Build toolchain binary and generate configs
      run: task setup && task gen

    - name: Build Uyuni OBS packages (HTML + PDF tarballs)
      run: task obs:uyuni

    - name: Archive Uyuni OBS packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
      with:
        name: uyuni-obs-packages-${{ github.ref_name }}
        path: build/packages/

    - name: Archive changelog
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
      with:
        name: changelog-${{ github.ref_name }}
        path: CHANGELOG.md

  # ── MLM OBS packages ───────────────────────────────────────────────────────
  mlm-obs:
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'manager-')

    container:
      image: ghcr.io/uyuni-project/uyuni-docs-builder:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v4

    - name: Build toolchain binary and generate configs
      run: task setup && task gen

    - name: Build SUSE Multi-Linux Manager OBS packages (HTML + PDF tarballs)
      run: task obs:mlm

    - name: Archive SUSE Multi-Linux Manager OBS packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
      with:
        name: mlm-obs-packages-${{ github.ref_name }}
        path: build/packages/

    - name: Archive changelog
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
      with:
        name: changelog-${{ github.ref_name }}
        path: CHANGELOG.md
