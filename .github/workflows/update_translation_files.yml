# DEPRECATED — po4a/Weblate translation template updates are no longer part of the build.
# Translations are committed as AsciiDoc under {lang}/modules/ at the repo root.
# See L10N-AI-MIGRATION.md for the new workflow.
#
# This workflow is retained for manual use only (workflow_dispatch).
name: Update translation files
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

    - name: 'Install po4a'
      run: |
        sudo apt-get update
        sudo apt-get install -y po4a

    - name: 'Update gettext files'
      run: |
        bash scripts/make_pot.sh

    - name: 'Commit changes, if any'
      uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 #v10.0.0
      with:
        author_name: Galaxy CI
        author_email: galaxy-ci@suse.de
        message: 'Automatic commit: update translation files'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
