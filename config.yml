# uyuni-docs build configuration
# Single source of truth replacing parameters.yml + site.yml attributes.
# Edit this file to change products, languages, branding, or add new outputs.

# --------------------------------------------------------------------------
# Antora extensions (applied to all builds)
# --------------------------------------------------------------------------
antora:
  extensions:
    - '@antora/lunr-extension'

# --------------------------------------------------------------------------
# AsciiDoc extensions (applied to all builds)
# --------------------------------------------------------------------------
asciidoc_extensions:
