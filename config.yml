# --------------------------------------------------------------------------
# Products
# --------------------------------------------------------------------------
products:

  # ---- SUSE Multi-Linux Manager -------------------------------------------
  mlm:
    antora:
      name: docs
      title: SUSE Multi-Linux Manager Guides

    asciidoc:
      attributes:
        productname: SUSE Multi-Linux Manager
        # Use quoted string to preserve trailing zero (5.0, 5.2, etc.)
        productnumber: "5.2 Beta 2"
        currentversion: Beta 2
        productchartversion: 5.2.0-beta2
        gitchartsbranch: Manager-5.2
        copyrightdate: "2011–2026"
        mlm-content: "true"
        uyuni-content: "false"
        page-pagination: "true"

    sections:
      - installation-and-upgrade
      - client-configuration
      - administration
      - reference
      - retail
      - common-workflows
      - specialized-guides
      - legal

    pdf:
      # Zip artifact name: {tar_name}_{lang}-pdf.zip
      tar_name: suse-multi-linux-manager-docs
      # OBS tarball base name: {obs_name}_{lang}.tar.gz / {obs_name}_{lang}-pdf.tar.gz
      obs_name: susemanager-docs

    ui:
      bundle: ./branding/default-ui/mlm/ui-bundle.zip

    outputs:
      # documentation.suse.com — production website with SUSE header
      mlm-dsc:
        site:
          title: SUSE Multi-Linux Manager 5.2 Documentation
          # URL gets /{lang}/ appended per language by docbuild
          url: https://documentation.suse.com/multi-linux-manager/5.2/
          start_page: docs::index.adoc
        supplemental_files: ./branding/supplemental-ui/mlm/susecom-2025
        language_selector: false
        obs: false

      # Product WebUI — embedded docs with language selector
      mlm-webui:
        site:
          title: SUSE Multi-Linux Manager 5.2 Documentation
          url: /
          start_page: docs::index.adoc
        supplemental_files: translations/{lang}/supplemental-ui
        language_selector: true
        obs: true

  # ---- Uyuni ---------------------------------------------------------------
  uyuni:
    antora:
      name: uyuni
      title: Uyuni 2026.04

    asciidoc:
      attributes:
        productname: Uyuni
        releaseversion: "2026.04"
        productnumber: "2026.04"
        productchartversion: "2026.4.0"
        gitchartsbranch: main
        mlm-content: "false"
        uyuni-content: "true"
        page-pagination: "true"

    sections:
      - installation-and-upgrade
      - client-configuration
      - administration
      - reference
      - retail
      - common-workflows
      - specialized-guides
      - legal

    pdf:
      tar_name: uyuni-docs
      obs_name: uyuni-docs

    ui:
      bundle: ./branding/default-ui/uyuni/ui-bundle.zip

    outputs:
      # Uyuni project website
      uyuni-website:
        site:
          title: Uyuni Documentation
          url: https://www.uyuni-project.org/uyuni-docs/
          start_page: uyuni::index.adoc
        supplemental_files: ./branding/supplemental-ui/uyuni/uyuni-2023
        language_selector: false
        obs: true

      # Uyuni product WebUI — embedded docs with language selector
      uyuni-webui:
        site:
          title: Uyuni Documentation
          url: /
          start_page: uyuni::index.adoc
        supplemental_files: translations/{lang}/supplemental-ui
        language_selector: true
        obs: true

# --------------------------------------------------------------------------
# Languages
# Add a new block here to enable a new language. No other changes needed.
# --------------------------------------------------------------------------
languages:
  - code: en
    locale: en_US.utf8
    date_format: "%B %d %Y"
    pdf_theme:
      mlm: suse
      uyuni: uyuni

  - code: ja
    locale: ja_JP.UTF-8
    date_format: "%Y年%m月%e日"
    pdf_theme:
      mlm: suse-jp
      uyuni: uyuni-jp
    cjk: true
    flag_svg: jaFlag
    nation: japan
    label: 日本語

  - code: zh_CN
    locale: zh_CN.UTF-8
    date_format: "%Y年%m月%e日"
    pdf_theme:
      mlm: suse-sc
      uyuni: uyuni-sc
    cjk: true
    flag_svg: china
    nation: china
    label: 中文

  - code: ko
    locale: ko_KR.UTF-8
    date_format: "%Y년%m월%e일"
    pdf_theme:
      mlm: suse-ko
      uyuni: uyuni-ko
    cjk: true
    flag_svg: koFlag
    nation: korea
    label: 한국어

